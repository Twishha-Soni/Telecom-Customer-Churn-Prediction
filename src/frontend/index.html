<!-- src/frontend/index.html -->
<!DOCTYPE html>
<html>
<head>
  <title>Customer Churn Prediction</title>
  <style>
    body { font-family: sans-serif; max-width: 640px; margin: 40px auto; }
    label { display: block; margin-top: 10px; font-weight: bold; }
    select, input { width: 100%; padding: 6px; margin-top: 4px; box-sizing: border-box; }
    button { margin-top: 20px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
    #result { margin-top: 20px; padding: 12px; border-radius: 6px; }
    .churn-yes { background: #ffe0e0; }
    .churn-no { background: #e0ffe0; }
    .prob-row { display: flex; justify-content: space-between; }
  </style>
</head>
<body>
  <h2>Customer Churn Prediction</h2>
  <form id="churnForm">
    <label>Gender
      <select name="gender">
        <option>Female</option>
        <option>Male</option>
      </select>
    </label>

    <label>Senior Citizen
      <select name="SeniorCitizen">
        <option value="0">No</option>
        <option value="1">Yes</option>
      </select>
    </label>

    <label>Partner
      <select name="Partner"><option>Yes</option><option>No</option></select>
    </label>

    <label>Dependents
      <select name="Dependents"><option>Yes</option><option>No</option></select>
    </label>

    <label>Tenure (months)
      <input type="number" name="tenure" min="0" value="12" required>
    </label>

    <label>Phone Service
      <select name="PhoneService"><option>Yes</option><option>No</option></select>
    </label>

    <label>Multiple Lines
      <select name="MultipleLines">
        <option>No</option>
        <option>Yes</option>
        <option>No phone service</option>
      </select>
    </label>

    <label>Internet Service
      <select name="InternetService">
        <option>DSL</option>
        <option>Fiber optic</option>
        <option>No</option>
      </select>
    </label>

    <label>Online Security
      <select name="OnlineSecurity">
        <option>No</option>
        <option>Yes</option>
        <option>No internet service</option>
      </select>
    </label>

    <label>Online Backup
      <select name="OnlineBackup">
        <option>No</option>
        <option>Yes</option>
        <option>No internet service</option>
      </select>
    </label>

    <label>Device Protection
      <select name="DeviceProtection">
        <option>No</option>
        <option>Yes</option>
        <option>No internet service</option>
      </select>
    </label>

    <label>Tech Support
      <select name="TechSupport">
        <option>No</option>
        <option>Yes</option>
        <option>No internet service</option>
      </select>
    </label>

    <label>Streaming TV
      <select name="StreamingTV">
        <option>No</option>
        <option>Yes</option>
        <option>No internet service</option>
      </select>
    </label>

    <label>Streaming Movies
      <select name="StreamingMovies">
        <option>No</option>
        <option>Yes</option>
        <option>No internet service</option>
      </select>
    </label>

    <label>Contract
      <select name="Contract">
        <option>Month-to-month</option>
        <option>One year</option>
        <option>Two year</option>
      </select>
    </label>

    <label>Paperless Billing
      <select name="PaperlessBilling"><option>Yes</option><option>No</option></select>
    </label>

    <label>Payment Method
      <select name="PaymentMethod">
        <option>Electronic check</option>
        <option>Mailed check</option>
        <option>Bank transfer (automatic)</option>
        <option>Credit card (automatic)</option>
      </select>
    </label>

    <label>Monthly Charges
      <input type="number" step="0.01" name="MonthlyCharges" min="0" value="70.00" required>
    </label>

    <label>Total Charges
      <input type="text" name="TotalCharges" value="840.00" required>
    </label>

    <button type="submit">Predict Churn</button>
  </form>

  <div id="result" style="display: none;"></div>

  <script>
    const form = document.getElementById("churnForm");
    const resultDiv = document.getElementById("result");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData(form);
      const payload = Object.fromEntries(formData.entries());

      // numeric fields need real number types, not strings, before JSON-encoding
      payload.SeniorCitizen = parseInt(payload.SeniorCitizen, 10);
      payload.tenure = parseInt(payload.tenure, 10);
      payload.MonthlyCharges = parseFloat(payload.MonthlyCharges);
      // TotalCharges stays a string on purpose - the API expects it that way

      resultDiv.style.display = "block";
      resultDiv.className = "";
      resultDiv.innerText = "Predicting...";

      try {
        const response = await fetch("/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        const data = await response.json();

        if (!response.ok) {
          resultDiv.innerText = `Error: ${JSON.stringify(data.detail)}`;
          return;
        }

        const willChurn = data.prediction === "Yes";
        resultDiv.className = willChurn ? "churn-yes" : "churn-no";

        const probLines = Object.entries(data.probabilities)
          .map(([label, p]) => `<div class="prob-row"><span>${label}</span><span>${(p * 100).toFixed(1)}%</span></div>`)
          .join("");

        resultDiv.innerHTML = `
          <h3>Prediction: ${data.prediction === "Yes" ? "Will Churn" : "Will Stay"}</h3>
          ${probLines}
        `;
      } catch (err) {
        resultDiv.innerText = `Request failed: ${err}`;
      }
    });
  </script>
</body>
</html>
